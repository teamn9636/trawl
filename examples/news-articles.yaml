name: news_articles
url: "https://news.example.com/*"
fields:
  - name: headline
    type: string
    description: "Article headline"
  - name: date
    type: date
    description: "Publication date"
  - name: author
    type: string
    nullable: true
    description: "Author name"
  - name: summary
    type: string
    nullable: true
    description: "Article summary or first paragraph"
  - name: url
    type: string
    description: "Link to the full article"
